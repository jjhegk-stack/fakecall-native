name: Build Android APK

# main 브랜치에 푸시하거나, Actions 탭에서 수동 실행("Run workflow")하면 APK를 빌드한다.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node 20 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: JDK 17 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Android SDK 설치
        uses: android-actions/setup-android@v3

      - name: SDK 패키지 설치 (platform 34 / build-tools)
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: npm 의존성 설치
        run: npm install

      - name: 안드로이드 플랫폼 생성
        run: npx cap add android

      - name: 웹 자산 동기화
        run: npx cap sync android

      - name: 정확 알람 권한 주입 (Doze에서도 정시 발화)
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # USE_EXACT_ALARM: 안드13+ 설치 시 자동 허용 → 화면 꺼짐/Doze에서도 정확 시각 발화
          grep -q 'USE_EXACT_ALARM' "$MANIFEST" || \
            sed -i 's#<manifest\(.*\)>#<manifest\1>\n    <uses-permission android:name="android.permission.USE_EXACT_ALARM" />\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />#' "$MANIFEST"
          echo "----- 주입 후 권한 목록 -----"
          grep -i 'uses-permission' "$MANIFEST" || true

      - name: 풀스크린 통화 네이티브 주입 (잠금화면 자동 표시)
        run: |
          PKG_DIR=android/app/src/main/java/site/scopelabs/fakecall
          mkdir -p "$PKG_DIR"
          # 커스텀 네이티브 파일을 생성된 안드로이드 프로젝트에 복사(MainActivity 덮어씀)
          cp native-android/MainActivity.java          "$PKG_DIR/MainActivity.java"
          cp native-android/FakeCall.java              "$PKG_DIR/FakeCall.java"
          cp native-android/CallAlarmReceiver.java     "$PKG_DIR/CallAlarmReceiver.java"
          cp native-android/CallForegroundService.java "$PKG_DIR/CallForegroundService.java"
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # full-screen intent 권한
          grep -q 'USE_FULL_SCREEN_INTENT' "$MANIFEST" || \
            sed -i 's#<manifest\(.*\)>#<manifest\1>\n    <uses-permission android:name="android.permission.USE_FULL_SCREEN_INTENT" />#' "$MANIFEST"
          # 화면 강제 점등(WAKE_LOCK)
          grep -q 'android.permission.WAKE_LOCK' "$MANIFEST" || \
            sed -i 's#<manifest\(.*\)>#<manifest\1>\n    <uses-permission android:name="android.permission.WAKE_LOCK" />#' "$MANIFEST"
          # 다른 앱 위에 표시(백그라운드에서 통화화면 직접 띄우기) — 가장 확실한 경로
          grep -q 'SYSTEM_ALERT_WINDOW' "$MANIFEST" || \
            sed -i 's#<manifest\(.*\)>#<manifest\1>\n    <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />#' "$MANIFEST"
          # 포그라운드 서비스 권한(가장 강력한 시도)
          grep -q 'android.permission.FOREGROUND_SERVICE"' "$MANIFEST" || \
            sed -i 's#<manifest\(.*\)>#<manifest\1>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />#' "$MANIFEST"
          grep -q 'FOREGROUND_SERVICE_SHORT_SERVICE' "$MANIFEST" || \
            sed -i 's#<manifest\(.*\)>#<manifest\1>\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_SHORT_SERVICE" />#' "$MANIFEST"
          # 알람 BroadcastReceiver 등록
          grep -q 'CallAlarmReceiver' "$MANIFEST" || \
            sed -i 's#</application>#    <receiver android:name=".CallAlarmReceiver" android:exported="false" />\n    </application>#' "$MANIFEST"
          # 포그라운드 서비스 등록(shortService 타입)
          grep -q 'CallForegroundService' "$MANIFEST" || \
            sed -i 's#</application>#    <service android:name=".CallForegroundService" android:exported="false" android:foregroundServiceType="shortService" />\n    </application>#' "$MANIFEST"
          echo "----- 주입된 java 파일 -----"
          ls -la "$PKG_DIR"
          echo "----- 최종 매니페스트 -----"
          cat "$MANIFEST"

      - name: 디버그 APK 빌드
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: APK 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: fakecall-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
