name: Build Android APK

# main 브랜치에 푸시하거나, Actions 탭에서 수동 실행("Run workflow")하면 APK를 빌드한다.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Node 20 설치
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: JDK 17 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Android SDK 설치
        uses: android-actions/setup-android@v3

      - name: SDK 패키지 설치 (platform 34 / build-tools)
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: npm 의존성 설치
        run: npm install

      - name: 안드로이드 플랫폼 생성
        run: npx cap add android

      - name: 웹 자산 동기화
        run: npx cap sync android

      - name: 정확 알람 권한 주입 (Doze에서도 정시 발화)
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # USE_EXACT_ALARM: 안드13+ 설치 시 자동 허용 → 화면 꺼짐/Doze에서도 정확 시각 발화
          grep -q 'USE_EXACT_ALARM' "$MANIFEST" || \
            sed -i 's#<manifest\(.*\)>#<manifest\1>\n    <uses-permission android:name="android.permission.USE_EXACT_ALARM" />\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />#' "$MANIFEST"
          echo "----- 주입 후 권한 목록 -----"
          grep -i 'uses-permission' "$MANIFEST" || true

      - name: 디버그 APK 빌드
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: APK 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: fakecall-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
